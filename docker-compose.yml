services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: lottery
      POSTGRES_PASSWORD: lottery
      POSTGRES_DB: lottery
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
volumes:
  pgdata:
